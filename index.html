<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN_E_E_E_ELK Dashboard</title>
    <style>
        /* Общие настройки страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden; 
        }

        /* Тонкая полоска статуса (28px) */
        #status-bar {
            height: 28px;
            background-color: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 11px;
            letter-spacing: 0.5px;
            box-sizing: border-box;
            color: #aaa;
        }

        .status-item { margin-right: 15px; }
        .status-val { font-weight: bold; }
        .online { color: #00ff00; }  /* Ярко-зеленый */
        .offline { color: #ff4444; } /* Ярко-красный */

        /* Настройка сетки (Grid) */
        .dashboard-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            /* Вычитаем высоту статус-бара из общей высоты экрана */
            height: calc(100vh - 28px); 
            padding: 10px;
            box-sizing: border-box;
        }

        .main-chart {
            grid-row: 1 / span 2;
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }

        .side-card {
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Статус-бар -->
    <div id="status-bar">
        <div id="bot-services">
            Loading system status...
        </div>
        <div id="bot-time">
            -
        </div>
    </div>

    <div class="dashboard-container">
        
        <div class="main-chart">
            <iframe title="Arb_bot_dashboard" src="https://app.powerbi.com/view?r=eyJrIjoiODNmNmZkY2MtMzY5Mi00MGFmLTg4MDktODM0MmE3ZDg0MGI0IiwidCI6IjZhM2Q2MmExLWY5YjYtNGRiNC05ZWMxLTQwMDM3MmQ4NjhjMCIsImMiOjl9" allowFullScreen="true"></iframe>
        </div>

        <div class="side-card">
            <iframe title="grd2" src="https://app.powerbi.com/view?r=eyJrIjoiNWE4YWM5YzAtNTY2OS00ODM1LTgzZjctYzJiYTc4NDA0MTVkIiwidCI6IjZhM2Q2MmExLWY5YjYtNGRiNC05ZWMxLTQwMDM3MmQ4NjhjMCIsImMiOjl9" allowFullScreen="true"></iframe>
        </div>

        <div class="side-card">
            <iframe title="grd" src="https://app.powerbi.com/view?r=eyJrIjoiODI0ZjMxMDQtYjNkMS00OTA4LTk3OGMtMmZiYTljMGQyNTQxIiwidCI6IjZhM2Q2MmExLWY5YjYtNGRiNC05ZWMxLTQwMDM3MmQ4NjhjMCIsImMiOjl9" allowFullScreen="true"></iframe>
        </div>

    </div>

    <script>
        async function getStatus() {
            try {
                // Добавляем timestamp к URL, чтобы браузер не кэшировал старый JSON
                const url = 'https://storage.googleapis.com/arb_bot_data/status.json?nocache=' + new Date().getTime();
                const response = await fetch(url);
                const data = await response.json();
                
                let html = "";
                // Перебираем сервисы из JSON
                for (const [name, status] of Object.entries(data.services)) {
                    const statusClass = (status === "ONLINE") ? "online" : "offline";
                    html += `<span class="status-item">${name.toUpperCase()}: <span class="status-val ${statusClass}">${status}</span></span>`;
                }
                
                document.getElementById('bot-services').innerHTML = html;
                document.getElementById('bot-time').innerText = "LAST SYNC: " + data.last_update;
                
            } catch (error) {
                document.getElementById('bot-services').innerHTML = '<span class="offline">CONNECTION ERROR</span>';
                console.error("Status fetch error:", error);
            }
        }

        // Обновляем статус каждые 30 секунд
        setInterval(getStatus, 30000);
        // Запускаем сразу при загрузке
        getStatus();
    </script>

</body>
</html>
